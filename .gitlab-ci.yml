workflow:
image: node:22
stages:
  - build
  - test
  - analyses

before_script:
  - npm install -g pnpm
  - pnpm install


build:
  stage: build
  script:
    - pnpm build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "lab4"'

    


test:
  stage: test
  needs: ["build"]
  script:
    - echo "test"

lint:
  stage: analyses
  needs: ["build"]
  script:
    - echo "lint"

typecheck:
  stage: analyses
  needs: ["build"]
  script:
    - echo "typecheck"