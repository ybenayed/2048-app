name: Lab 2 – Script execution

on:
  push:
    branches:
      - lab3
  workflow_dispatch:

jobs:
  run-lab2:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@8 --activate

      - name: Run Lab 2 script
        run: bash deliverables/lab02/lab2.sh
