name: CI

env:
  NODE_VERSION: '22'

on:
  push:
    branches:
      - lab4
    paths-ignore:
      - './docs/**'
  pull_request:
    branches:
      - lab4
    paths-ignore:
      - './docs/**'
  workflow_dispatch:

jobs:
  build:
    name: Build application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:

          node-version: ${{ env.NODE_VERSION }}

          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build


      - name: Upload build output
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: .output/

  store-artifact:
    name: Store artifact
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/lab4'
    steps:
      - name: Download build output
        uses: actions/download-artifact@v6
        with:
          name: build-output
          path: .output/


      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v6
        with:
          name: 2048-app-build
          path: .output/
          retention-days: ${{ github.ref == 'refs/heads/lab4' && 7 || 1 }}

  lint-and-typecheck:
    name: Lint and type checking
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Type checking
        run: pnpm typecheck

  test:
    name: Run tests
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test
